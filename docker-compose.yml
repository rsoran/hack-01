version: '3.8'

services:
  # Web application service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cooking-todo-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      # Optional: Mount for development (comment out for production)
      - ./backend:/app
      - ./frontend:/app/static
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - cooking-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: cooking-todo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - cooking-network

networks:
  cooking-network:
    driver: bridge

volumes:
  app_data:
    driver: local
