version: '3.8'

services:
  # Development web service with hot reload
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cooking-todo-dev
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - PORT=5000
      - FLASK_DEBUG=1
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      # Enable hot reload for development
      - ./backend:/app
      - ./frontend:/app/static
    restart: unless-stopped
    networks:
      - cooking-network

networks:
  cooking-network:
    driver: bridge
